<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Packing List Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f5f7fb;
        }

        .hero {
            max-width: 1040px;
            margin: 32px auto;
        }

        .card {
            border: none;
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        .vehicle-card {
            background: #fff;
            border: 1px solid #edf0f5;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .form-control,
        .form-select {
            min-height: 58px;
            border-radius: 12px;
            font-size: 1rem;
        }

        button {
            border-radius: 12px !important;
            height: 58px;
            font-size: 16px;
        }

        .hint {
            font-size: 0.9rem;
            color: #6b7280;
            margin-top: 6px;
        }

        .custom-file {
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-height: 58px;
            border: 1px solid #ced4da;
            border-radius: 12px;
            background: #fff;
            overflow: hidden;
            padding-left: 16px;
        }

        .custom-file-name {
            color: #6b7280;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding-right: 12px;
            flex: 1;
        }

        .custom-file-btn {
            height: 100%;
            min-height: 58px;
            border: none;
            border-left: 1px solid #ced4da;
            background: #f8f9fa;
            padding: 0 18px;
            font-size: 1rem;
            cursor: pointer;
            white-space: nowrap;
        }

        .custom-file input[type="file"] {
            display: none;
        }
    </style>
</head>
<body>
<div class="container hero">
    <div class="card p-4 p-md-5">
        <h1 class="mb-3">Packing List Generator</h1>
        <p class="text-muted mb-4">
            Fill the packing list using passport, VIN sticker, and export declaration.
        </p>

        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <div class="alert alert-danger">
            {% for message in messages %}
            <div>{{ message }}</div>
            {% endfor %}
        </div>
        {% endif %}
        {% endwith %}

        <form id="mainForm" action="/generate" method="post" enctype="multipart/form-data">
            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">Container Number</label>
                    <input class="form-control" type="text" name="container_number" placeholder="TGHU1234567" required>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Seal Number</label>
                    <input class="form-control" type="text" name="seal_number" placeholder="SEAL-98765" required>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Date</label>
                    <input class="form-control" type="text" name="page_date" placeholder="DD.MM.YYYY" required>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Number of Vehicles</label>
                    <select class="form-select" name="vehicle_count" id="vehicleCount" required>
                        <option value="">Select</option>
                        {% for i in range(1, 11) %}
                        <option value="{{ i }}">{{ i }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Country</label>
                    <select class="form-select" name="country" id="countrySelect" required>
                        <option value="">Select country</option>
                        {% for country in country_options %}
                        <option value="{{ country }}">{{ country }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="col-md-4">
                    <label class="form-label">City</label>
                    <input class="form-control" type="text" name="city" placeholder="Bishkek" required>
                </div>
            </div>

            <div class="row g-3 mt-2 d-none" id="otherCountryWrap">
                <div class="col-md-4">
                    <label class="form-label">Other Country</label>
                    <input class="form-control" type="text" name="other_country" placeholder="Enter country">
                </div>
            </div>

            <hr class="my-4">

            <div id="vehicleUploads"></div>

            <button class="btn btn-primary w-100 mt-3" type="submit">
                Generate Packing List
            </button>
        </form>
    </div>
</div>

<script>
    const vehicleCount = document.getElementById('vehicleCount');
    const vehicleUploads = document.getElementById('vehicleUploads');
    const countrySelect = document.getElementById('countrySelect');
    const otherCountryWrap = document.getElementById('otherCountryWrap');

    function createCustomFileInput(labelText, inputName, acceptValue) {
        return `
            <label class="form-label">${labelText}</label>
            <label class="custom-file">
                <span class="custom-file-name">No file chosen</span>
                <span class="custom-file-btn">Choose File</span>
                <input type="file" name="${inputName}" accept="${acceptValue}" required onchange="updateFileName(this)">
            </label>
        `;
    }

    function renderVehicleFields(count) {
        vehicleUploads.innerHTML = '';
        const total = Number(count || 0);

        for (let i = 1; i <= total; i++) {
            const wrapper = document.createElement('div');
            wrapper.className = 'vehicle-card';

            wrapper.innerHTML = `
                <h5 class="mb-3">Vehicle #${i}</h5>
                <div class="row g-3">
                    <div class="col-md-4">
                        ${createCustomFileInput("Passport Photo", `passport_${i}`, "image/*,.pdf")}
                    </div>

                    <div class="col-md-4">
                        ${createCustomFileInput("VIN Sticker Photo", `vin_${i}`, "image/*,.pdf")}
                    </div>

                    <div class="col-md-4">
                        ${createCustomFileInput("Export Declaration (PDF)", `export_${i}`, ".pdf")}
                    </div>
                </div>
            `;

            vehicleUploads.appendChild(wrapper);
        }
    }

    function updateFileName(input) {
        const fileNameSpan = input.closest('.custom-file').querySelector('.custom-file-name');
        fileNameSpan.textContent = input.files.length ? input.files[0].name : 'No file chosen';
    }

    vehicleCount.addEventListener('change', function (e) {
        renderVehicleFields(e.target.value);
    });

    countrySelect.addEventListener('change', function (e) {
        otherCountryWrap.classList.toggle('d-none', e.target.value !== 'Other');
    });
</script>
</body>
</html>
